<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой веб-браузер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .browser-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background-color: #2c2c2c;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .browser-header {
            background-color: #3c3c3c;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #4a4a4a;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            margin-right: 16px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .close {
            background-color: #ff5f57;
        }

        .minimize {
            background-color: #ffbd2e;
        }

        .maximize {
            background-color: #28ca42;
        }

        .navigation-controls {
            display: flex;
            gap: 8px;
            margin-right: 16px;
        }

        .nav-btn {
            background-color: #4a4a4a;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .nav-btn:hover {
            background-color: #5a5a5a;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .address-bar {
            flex: 1;
            display: flex;
            background-color: #4a4a4a;
            border-radius: 20px;
            overflow: hidden;
        }

        .address-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .go-btn {
            background-color: #5a5a5a;
            border: none;
            color: white;
            padding: 0 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .go-btn:hover {
            background-color: #6a6a6a;
        }

        .browser-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-bar {
            background-color: #3c3c3c;
            display: flex;
            padding: 0 8px;
            border-bottom: 1px solid #4a4a4a;
        }

        .tab {
            background-color: #4a4a4a;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 8px 8px 0 0;
            margin-right: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            max-width: 200px;
        }

        .tab.active {
            background-color: #2c2c2c;
            color: white;
        }

        .tab-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tab-close {
            margin-left: 8px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #6a6a6a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }

        .tab-close:hover {
            background-color: #ff5f57;
        }

        .new-tab {
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ccc;
            cursor: pointer;
            font-size: 20px;
        }

        .new-tab:hover {
            color: white;
        }

        .view-container {
            flex: 1;
            background-color: white;
            overflow: hidden;
            position: relative;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .start-page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .start-page h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .start-page p {
            font-size: 1.2rem;
            margin-bottom: 24px;
            max-width: 600px;
        }

        .quick-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .quick-link {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .quick-link:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .loading-bar {
            height: 3px;
            width: 0;
            background-color: #4CAF50;
            position: absolute;
            top: 0;
            left: 0;
            transition: width 0.3s;
        }

        .error-message {
            padding: 20px;
            color: #ff5555;
            text-align: center;
        }

        @media (max-width: 768px) {
            .browser-container {
                height: 95vh;
            }
            
            .navigation-controls {
                margin-right: 8px;
            }
            
            .nav-btn {
                width: 28px;
                height: 28px;
            }
            
            .address-bar input {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="browser-header">
            <div class="window-controls">
                <div class="control-btn close"></div>
                <div class="control-btn minimize"></div>
                <div class="control-btn maximize"></div>
            </div>
            <div class="navigation-controls">
                <button class="nav-btn" id="back-btn" title="Назад">←</button>
                <button class="nav-btn" id="forward-btn" title="Вперёд">→</button>
                <button class="nav-btn" id="refresh-btn" title="Обновить">↻</button>
            </div>
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="Введите адрес сайта или поисковый запрос">
                <button class="go-btn" id="go-btn">Перейти</button>
            </div>
        </div>
        
        <div class="browser-content">
            <div class="tab-bar">
                <div class="tab active" data-tab="1">
                    <span class="tab-title">Стартовая страница</span>
                    <div class="tab-close">×</div>
                </div>
                <div class="new-tab" id="new-tab-btn">+</div>
            </div>
            
            <div class="view-container">
                <div class="loading-bar" id="loading-bar"></div>
                
                <div class="start-page" id="start-page">
                    <h1>Простой веб-браузер</h1>
                    <p>Введите адрес в строку выше или выберите один из быстрых вариантов:</p>
                    <div class="quick-links">
                        <div class="quick-link" data-url="https://www.google.com">Google</div>
                        <div class="quick-link" data-url="https://www.youtube.com">YouTube</div>
                        <div class="quick-link" data-url="https://github.com">GitHub</div>
                        <div class="quick-link" data-url="https://ru.wikipedia.org">Википедия</div>
                    </div>
                </div>
                
                <iframe class="browser-frame" id="browser-frame" style="display: none;"></iframe>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Элементы DOM
            const backBtn = document.getElementById('back-btn');
            const forwardBtn = document.getElementById('forward-btn');
            const refreshBtn = document.getElementById('refresh-btn');
            const urlInput = document.getElementById('url-input');
            const goBtn = document.getElementById('go-btn');
            const newTabBtn = document.getElementById('new-tab-btn');
            const browserFrame = document.getElementById('browser-frame');
            const startPage = document.getElementById('start-page');
            const loadingBar = document.getElementById('loading-bar');
            const tabBar = document.querySelector('.tab-bar');
            
            // История навигации
            let history = {
                current: 0,
                pages: [{
                    url: '',
                    title: 'Стартовая страница'
                }]
            };
            
            // Текущая активная вкладка
            let activeTab = 1;
            
            // Обновление состояния кнопок навигации
            function updateNavButtons() {
                backBtn.disabled = history.current === 0;
                forwardBtn.disabled = history.current === history.pages.length - 1;
            }
            
            // Навигация назад
            backBtn.addEventListener('click', function() {
                if (history.current > 0) {
                    history.current--;
                    loadPage(history.pages[history.current].url);
                }
            });
            
            // Навигация вперёд
            forwardBtn.addEventListener('click', function() {
                if (history.current < history.pages.length - 1) {
                    history.current++;
                    loadPage(history.pages[history.current].url);
                }
            });
            
            // Обновление страницы
            refreshBtn.addEventListener('click', function() {
                if (browserFrame.style.display !== 'none') {
                    browserFrame.contentWindow.location.reload();
                }
            });
            
            // Загрузка страницы
            function loadPage(url) {
                // Показываем индикатор загрузки
                loadingBar.style.width = '30%';
                
                // Если URL пустой, показываем стартовую страницу
                if (!url) {
                    browserFrame.style.display = 'none';
                    startPage.style.display = 'flex';
                    urlInput.value = '';
                    loadingBar.style.width = '0';
                    return;
                }
                
                // Форматируем URL
                let formattedUrl = url;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    // Если это не URL, выполняем поиск в Google
                    if (url.includes(' ') || url.includes('.') === false) {
                        formattedUrl = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                    } else {
                        formattedUrl = 'https://' + url;
                    }
                }
                
                // Загружаем страницу в iframe
                browserFrame.src = formattedUrl;
                browserFrame.style.display = 'block';
                startPage.style.display = 'none';
                urlInput.value = formattedUrl;
                
                // Обновляем историю
                if (history.pages[history.current].url !== formattedUrl) {
                    // Удаляем всё после текущей позиции
                    history.pages = history.pages.slice(0, history.current + 1);
                    // Добавляем новую страницу
                    history.pages.push({
                        url: formattedUrl,
                        title: 'Загрузка...'
                    });
                    history.current++;
                }
                
                updateNavButtons();
                
                // Имитация завершения загрузки
                setTimeout(() => {
                    loadingBar.style.width = '100%';
                    setTimeout(() => {
                        loadingBar.style.width = '0';
                    }, 300);
                }, 1000);
            }
            
            // Обработчик кнопки "Перейти"
            goBtn.addEventListener('click', function() {
                loadPage(urlInput.value);
            });
            
            // Обработчик нажатия Enter в адресной строке
            urlInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loadPage(urlInput.value);
                }
            });
            
            // Обработчики быстрых ссылок
            document.querySelectorAll('.quick-link').forEach(link => {
                link.addEventListener('click', function() {
                    loadPage(this.getAttribute('data-url'));
                });
            });
            
            // Создание новой вкладки
            newTabBtn.addEventListener('click', function() {
                const tabId = Date.now();
                const newTab = document.createElement('div');
                newTab.className = 'tab';
                newTab.setAttribute('data-tab', tabId);
                newTab.innerHTML = `
                    <span class="tab-title">Новая вкладка</span>
                    <div class="tab-close">×</div>
                `;
                
                // Вставляем новую вкладку перед кнопкой "+"
                tabBar.insertBefore(newTab, newTabBtn);
                
                // Активируем новую вкладку
                activateTab(tabId);
                
                // Показываем стартовую страницу
                browserFrame.style.display = 'none';
                startPage.style.display = 'flex';
                urlInput.value = '';
                
                // Обработчик закрытия вкладки
                newTab.querySelector('.tab-close').addEventListener('click', function(e) {
                    e.stopPropagation();
                    closeTab(tabId);
                });
                
                // Обработчик активации вкладки
                newTab.addEventListener('click', function() {
                    activateTab(tabId);
                });
            });
            
            // Активация вкладки
            function activateTab(tabId) {
                // Убираем активный класс у всех вкладок
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.remove('active');
                });
                
                // Добавляем активный класс к выбранной вкладке
                const tab = document.querySelector(`.tab[data-tab="${tabId}"]`);
                if (tab) {
                    tab.classList.add('active');
                    activeTab = tabId;
                    
                    // Здесь должна быть логика загрузки содержимого вкладки
                    // В этом упрощённом примере мы всегда показываем стартовую страницу для новых вкладок
                    browserFrame.style.display = 'none';
                    startPage.style.display = 'flex';
                    urlInput.value = '';
                }
            }
            
            // Закрытие вкладки
            function closeTab(tabId) {
                const tab = document.querySelector(`.tab[data-tab="${tabId}"]`);
                if (tab) {
                    tab.remove();
                    
                    // Если закрыли активную вкладку, активируем первую доступную
                    if (activeTab === tabId) {
                        const remainingTabs = document.querySelectorAll('.tab');
                        if (remainingTabs.length > 0) {
                            const firstTabId = remainingTabs[0].getAttribute('data-tab');
                            activateTab(firstTabId);
                        } else {
                            // Если вкладок не осталось, создаём новую
                            newTabBtn.click();
                        }
                    }
                }
            }
            
            // Инициализация
            updateNavButtons();
            
            // Обработчик закрытия вкладки по умолчанию
            document.querySelector('.tab-close').addEventListener('click', function(e) {
                e.stopPropagation();
                closeTab(1);
            });
        });
    </script>
</body>
</html>
