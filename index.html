<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ghtube, обход блокировки youtube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #ff0000;
            --dark-bg: #0f0f0f;
            --dark-surface: #272727;
            --dark-hover: #3d3d3d;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--dark-surface);
            border-radius: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .logo i {
            color: var(--primary-red);
        }

        .proxy-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .proxy-btn {
            padding: 10px 20px;
            background: var(--dark-surface);
            border: 1px solid var(--dark-hover);
            border-radius: 20px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .proxy-btn:hover {
            background: var(--dark-hover);
        }

        .proxy-btn.active {
            background: var(--primary-red);
            border-color: var(--primary-red);
        }

        .search-container {
            display: flex;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--dark-surface);
            border: 1px solid var(--dark-hover);
            border-radius: 20px 0 0 20px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            padding: 12px 24px;
            background: var(--primary-red);
            border: none;
            border-radius: 0 20px 20px 0;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        .video-info {
            background: var(--dark-surface);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .video-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .video-meta {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .recommendations {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .video-card {
            background: var(--dark-surface);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: translateY(-2px);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .card-info {
            padding: 12px;
        }

        .card-title {
            font-weight: 500;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-channel {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .status-bar {
            background: var(--dark-surface);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
        }

        .status-dot.connecting {
            background: #FFC107;
            animation: pulse 1.5s infinite;
        }

        .status-dot.error {
            background: #f44336;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .proxy-info {
            background: var(--dark-surface);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .proxy-info h3 {
            margin-bottom: 10px;
            color: var(--primary-red);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--dark-surface);
            border-top: 2px solid var(--primary-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .proxy-selector {
                flex-direction: column;
                align-items: center;
            }
            
            .proxy-btn {
                width: 100%;
                max-width: 300px;
            }
            
            .recommendations {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fab fa-youtube"></i>
                <span>ghtube</span>
            </div>
            <p>Доступ к YouTube без прокси и впн</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Выберите метод доступа</span>
            </div>
            <div id="connectionInfo"></div>
        </div>
        
        <div class="proxy-selector">
            <button class="proxy-btn active" onclick="selectProxy('cors')">CORS Proxy</button>
            <button class="proxy-btn" onclick="selectProxy('youtubeproxy')">YouTube Proxy</button>
            <button class="proxy-btn" onclick="selectProxy('invidious')">Invidious</button>
            <button class="proxy-btn" onclick="selectProxy('piped')">Piped</button>
            <button class="proxy-btn" onclick="selectProxy('direct')">Прямое соединение</button>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Введите URL YouTube видео или поисковый запрос...">
            <button class="search-btn" onclick="loadVideo()">
                <i class="fas fa-play"></i> Смотреть
            </button>
        </div>

        <div class="video-player" id="videoPlayer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Выберите видео для воспроизведения</div>
            </div>
        </div>

        <div class="video-info" id="videoInfo" style="display: none;">
            <div class="video-title" id="videoTitle">Название видео</div>
            <div class="video-meta" id="videoMeta">Информация о видео</div>
        </div>

        <div class="recommendations" id="recommendations">
        </div>
    </div>

    <script>
        // Конфигурация прокси и методов обхода
        const PROXY_CONFIG = {
            cors: {
                name: "CORS Proxy",
                videoUrl: (id) => `https://www.youtube.com/embed/${id}`,
                apiUrl: (endpoint) => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.youtube.com/${endpoint}`)}`,
                type: "embed"
            },
            youtubeproxy: {
                name: "YouTube Proxy",
                videoUrl: (id) => `https://yt.artemislena.eu/embed/${id}`,
                apiUrl: (endpoint) => `https://yt.artemislena.eu/api/v1/${endpoint}`,
                type: "proxy"
            },
            invidious: {
                name: "Invidious",
                videoUrl: (id) => `https://invidious.fdn.fr/embed/${id}`,
                apiUrl: (endpoint) => `https://invidious.fdn.fr/api/v1/${endpoint}`,
                type: "alternative"
            },
            piped: {
                name: "Piped",
                videoUrl: (id) => `https://piped.video/embed/${id}`,
                apiUrl: (endpoint) => `https://piped.video/api/v1/${endpoint}`,
                type: "alternative"
            },
            direct: {
                name: "Прямое соединение",
                videoUrl: (id) => `https://www.youtube.com/embed/${id}`,
                apiUrl: (endpoint) => `https://www.youtube.com/${endpoint}`,
                type: "direct"
            }
        };

        // Текущие настройки
        let currentProxy = 'cors';
        let currentVideoId = null;

        // Элементы DOM
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const connectionInfo = document.getElementById('connectionInfo');
        const videoPlayer = document.getElementById('videoPlayer');
        const videoInfo = document.getElementById('videoInfo');
        const videoTitle = document.getElementById('videoTitle');
        const videoMeta = document.getElementById('videoMeta');
        const recommendations = document.getElementById('recommendations');

        // Выбор прокси
        function selectProxy(proxyType) {
            document.querySelectorAll('.proxy-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            currentProxy = proxyType;
            updateStatus('connecting', `Подключение через ${PROXY_CONFIG[proxyType].name}...`);
            
            // Тестируем соединение
            testConnection(proxyType).then(success => {
                if (success) {
                    updateStatus('connected', `Подключено через ${PROXY_CONFIG[proxyType].name}`);
                    if (currentVideoId) {
                        loadVideoById(currentVideoId);
                    }
                } else {
                    updateStatus('error', `Ошибка подключения через ${PROXY_CONFIG[proxyType].name}`);
                }
            });
        }

        // Обновление статуса
        function updateStatus(status, message) {
            statusDot.className = 'status-dot';
            statusText.textContent = message;
            
            switch(status) {
                case 'connecting':
                    statusDot.classList.add('connecting');
                    break;
                case 'connected':
                    statusDot.classList.add('connected');
                    break;
                case 'error':
                    statusDot.classList.add('error');
                    break;
            }
            
            connectionInfo.textContent = `Метод: ${PROXY_CONFIG[currentProxy].name} | Тип: ${PROXY_CONFIG[currentProxy].type}`;
        }

        // Тестирование соединения
        async function testConnection(proxyType) {
            try {
                const testUrl = PROXY_CONFIG[proxyType].apiUrl('oembed?url=https://www.youtube.com/watch?v=dQw4w9WgXcQ');
                const response = await fetch(testUrl, { 
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                return response.ok;
            } catch (error) {
                console.error('Connection test failed:', error);
                return false;
            }
        }

        // Загрузка видео по URL или ID
        function loadVideo() {
            const input = document.getElementById('searchInput').value.trim();
            
            if (!input) {
                alert('Пожалуйста, введите URL YouTube видео или поисковый запрос');
                return;
            }

            let videoId = extractVideoId(input);
            
            if (!videoId) {
                // Если это не URL, пытаемся поискать
                searchVideos(input);
                return;
            }

            loadVideoById(videoId);
        }

        // Извлечение ID видео из URL
        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?#]+)/,
                /^[A-Za-z0-9_-]{11}$/
            ];
            
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            
            return null;
        }

        // Загрузка видео по ID
        function loadVideoById(videoId) {
            currentVideoId = videoId;
            const proxy = PROXY_CONFIG[currentProxy];
            
            updateStatus('connecting', `Загрузка видео через ${proxy.name}...`);
            
            // Создаем iframe для видео
            videoPlayer.innerHTML = `
                <iframe 
                    src="${proxy.videoUrl(videoId)}" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
            
            // Загружаем информацию о видео
            loadVideoInfo(videoId);
            
            // Загружаем рекомендации
            loadRecommendations(videoId);
            
            updateStatus('connected', `Видео загружено через ${proxy.name}`);
        }

        // Загрузка информации о видео
        async function loadVideoInfo(videoId) {
            try {
                const proxy = PROXY_CONFIG[currentProxy];
                let apiUrl;
                
                if (proxy.type === 'proxy' || proxy.type === 'alternative') {
                    apiUrl = proxy.apiUrl(`videos/${videoId}`);
                } else {
                    // Для CORS и прямого соединения используем обходные методы
                    apiUrl = `https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`;
                }
                
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                videoTitle.textContent = data.title || 'Название не доступно';
                videoMeta.textContent = data.author_name ? `Канал: ${data.author_name}` : 'Информация о видео';
                videoInfo.style.display = 'block';
                
            } catch (error) {
                console.error('Error loading video info:', error);
                videoTitle.textContent = 'Ошибка загрузки информации';
                videoMeta.textContent = 'Попробуйте другой метод доступа';
                videoInfo.style.display = 'block';
            }
        }

        // Поиск видео
        async function searchVideos(query) {
            updateStatus('connecting', `Поиск видео: ${query}...`);
            
            try {
                const proxy = PROXY_CONFIG[currentProxy];
                let searchUrl;
                
                if (proxy.type === 'proxy' || proxy.type === 'alternative') {
                    searchUrl = proxy.apiUrl(`search?q=${encodeURIComponent(query)}&filter=videos`);
                } else {
                    // Для CORS используем обходной метод
                    searchUrl = `https://noembed.com/embed?url=https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                }
                
                const response = await fetch(searchUrl);
                const data = await response.json();
                
                displaySearchResults(data, query);
                updateStatus('connected', `Найдено видео по запросу: ${query}`);
                
            } catch (error) {
                console.error('Search error:', error);
                updateStatus('error', 'Ошибка поиска');
            }
        }

        // Отображение результатов поиска
        function displaySearchResults(data, query) {
            recommendations.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>Загрузка результатов...</div></div>';
            
            // Симуляция результатов поиска (в реальном приложении здесь будет парсинг данных)
            setTimeout(() => {
                const mockResults = [
                    { id: 'dQw4w9WgXcQ', title: `Результат по запросу: ${query}`, channel: 'YouTube' },
                    { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', channel: 'Luis Fonsi' },
                    { id: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE', channel: 'officialpsy' },
                    { id: 'JGwWNGJdvx8', title: 'Ed Sheeran - Shape of You', channel: 'Ed Sheeran' }
                ];
                
                recommendations.innerHTML = mockResults.map(video => `
                    <div class="video-card" onclick="loadVideoById('${video.id}')">
                        <img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}" class="thumbnail">
                        <div class="card-info">
                            <div class="card-title">${video.title}</div>
                            <div class="card-channel">${video.channel}</div>
                        </div>
                    </div>
                `).join('');
            }, 1000);
        }

        // Загрузка рекомендаций
        async function loadRecommendations(videoId) {
            recommendations.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>Загрузка рекомендаций...</div></div>';
            
            try {
                // Используем статические рекомендации для демонстрации
                const mockRecommendations = [
                    { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', channel: 'Luis Fonsi' },
                    { id: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE', channel: 'officialpsy' },
                    { id: 'JGwWNGJdvx8', title: 'Ed Sheeran - Shape of You', channel: 'Ed Sheeran' },
                    { id: 'fJ9rUzIMcZQ', title: 'Queen - Bohemian Rhapsody', channel: 'Queen Official' },
                    { id: 'OPf0YbXqDm0', title: 'Mark Ronson - Uptown Funk ft. Bruno Mars', channel: 'Mark Ronson' },
                    { id: '09R8_2nJtjg', title: 'Maroon 5 - Sugar', channel: 'Maroon5' }
                ];
                
                setTimeout(() => {
                    recommendations.innerHTML = mockRecommendations.map(video => `
                        <div class="video-card" onclick="loadVideoById('${video.id}')">
                            <img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}" class="thumbnail">
                            <div class="card-info">
                                <div class="card-title">${video.title}</div>
                                <div class="card-channel">${video.channel}</div>
                            </div>
                        </div>
                    `).join('');
                }, 1500);
                
            } catch (error) {
                console.error('Error loading recommendations:', error);
                recommendations.innerHTML = '<div class="error">Ошибка загрузки рекомендаций</div>';
            }
        }

        // Инициализация
        function init() {
            updateStatus('connected', 'Готов к работе. Выберите видео.');
            
            // Загружаем популярные видео при старте
            loadRecommendations('dQw4w9WgXcQ');
            
            // Обработка Enter в поле поиска
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loadVideo();
                }
            });
        }

        // Запуск при загрузке страницы
        window.onload = init;
    </script>
</body>
</html>
