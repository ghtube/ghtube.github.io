<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Браузер с обходом ограничений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .browser-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background-color: #2c2c2c;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .browser-header {
            background-color: #3c3c3c;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #4a4a4a;
        }

        .navigation-controls {
            display: flex;
            gap: 8px;
            margin-right: 16px;
        }

        .nav-btn {
            background-color: #4a4a4a;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
        }

        .address-bar {
            flex: 1;
            display: flex;
            background-color: #4a4a4a;
            border-radius: 20px;
            overflow: hidden;
        }

        .address-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .go-btn {
            background-color: #5a5a5a;
            border: none;
            color: white;
            padding: 0 16px;
            cursor: pointer;
        }

        .browser-content {
            flex: 1;
            background-color: white;
            overflow: hidden;
            position: relative;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .start-page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .status-message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background: rgba(0,0,0,0.3);
        }

        .error-message {
            background: rgba(255,0,0,0.3);
            color: #ff9999;
        }

        .success-message {
            background: rgba(0,255,0,0.3);
            color: #99ff99;
        }

        .method-selector {
            margin: 10px 0;
        }

        .method-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 4px;
            cursor: pointer;
        }

        .method-btn.active {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="browser-header">
            <div class="navigation-controls">
                <button class="nav-btn" id="back-btn">←</button>
                <button class="nav-btn" id="forward-btn">→</button>
                <button class="nav-btn" id="refresh-btn">↻</button>
            </div>
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="Введите адрес сайта (попробуйте duckduckgo.com)">
                <button class="go-btn" id="go-btn">Перейти</button>
            </div>
        </div>
        
        <div class="browser-content">
            <div class="start-page" id="start-page">
                <h1>Умный браузер</h1>
                <p>Использует различные методы для обхода ограничений</p>
                
                <div class="method-selector">
                    <button class="method-btn active" data-method="direct">Прямая загрузка</button>
                    <button class="method-btn" data-method="googlewebview">Google WebView</button>
                    <button class="method-btn" data-method="textise">Textise имитация</button>
                </div>
                
                <div class="quick-links">
                    <div class="quick-link" data-url="https://duckduckgo.com">DuckDuckGo</div>
                    <div class="quick-link" data-url="https://www.bing.com">Bing</div>
                    <div class="quick-link" data-url="https://www.wikipedia.org">Wikipedia</div>
                    <div class="quick-link" data-url="https://httpbin.org/ip">Тест подключения</div>
                </div>
                
                <div class="status-message" id="status-message">
                    Готов к работе. Выберите сайт для тестирования.
                </div>
            </div>
            <iframe class="browser-frame" id="browser-frame" style="display: none;"></iframe>
            <div id="text-content" style="display: none; padding: 20px; height: 100%; overflow: auto;"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const backBtn = document.getElementById('back-btn');
            const forwardBtn = document.getElementById('forward-btn');
            const refreshBtn = document.getElementById('refresh-btn');
            const urlInput = document.getElementById('url-input');
            const goBtn = document.getElementById('go-btn');
            const browserFrame = document.getElementById('browser-frame');
            const startPage = document.getElementById('start-page');
            const statusMessage = document.getElementById('status-message');
            const textContent = document.getElementById('text-content');
            const methodBtns = document.querySelectorAll('.method-btn');
            const quickLinks = document.querySelectorAll('.quick-link');

            let currentMethod = 'direct';
            let currentUrl = '';

            // Инициализация методов
            methodBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    methodBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMethod = this.getAttribute('data-method');
                    updateStatus(`Метод изменен: ${this.textContent}`);
                });
            });

            // Быстрые ссылки
            quickLinks.forEach(link => {
                link.addEventListener('click', function() {
                    const url = this.getAttribute('data-url');
                    urlInput.value = url;
                    loadPage(url);
                });
            });

            function updateStatus(message, type = 'info') {
                statusMessage.textContent = message;
                statusMessage.className = 'status-message';
                if (type === 'error') {
                    statusMessage.classList.add('error-message');
                } else if (type === 'success') {
                    statusMessage.classList.add('success-message');
                }
            }

            async function loadPage(url) {
                if (!url) return;

                currentUrl = url;
                let formattedUrl = url;
                
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    formattedUrl = 'https://' + url;
                }

                updateStatus(`Загрузка: ${formattedUrl} (метод: ${currentMethod})`);

                try {
                    // Скрываем все контейнеры
                    browserFrame.style.display = 'none';
                    startPage.style.display = 'none';
                    textContent.style.display = 'none';

                    switch(currentMethod) {
                        case 'direct':
                            await loadDirect(formattedUrl);
                            break;
                        case 'googlewebview':
                            await loadGoogleWebView(formattedUrl);
                            break;
                        case 'textise':
                            await loadTextise(formattedUrl);
                            break;
                    }
                } catch (error) {
                    updateStatus(`Ошибка: ${error.message}`, 'error');
                    showStartPage();
                }
            }

            // Метод 1: Прямая загрузка с обработкой ошибок
            function loadDirect(url) {
                return new Promise((resolve, reject) => {
                    browserFrame.src = url;
                    browserFrame.style.display = 'block';
                    
                    browserFrame.onload = function() {
                        try {
                            // Проверяем, не заблокирован ли доступ
                            const frameDoc = browserFrame.contentDocument || browserFrame.contentWindow.document;
                            if (frameDoc.body.innerHTML.includes('denied') || 
                                frameDoc.body.innerHTML.includes('blocked') ||
                                frameDoc.body.innerHTML.includes('X-Frame-Options')) {
                                reject(new Error('Сайт запрещает встраивание'));
                            } else {
                                updateStatus('Загрузка успешна!', 'success');
                                resolve();
                            }
                        } catch (e) {
                            // CORS ошибка - но контент может быть загружен
                            updateStatus('Контент загружен (ограниченный доступ)', 'success');
                            resolve();
                        }
                    };
                    
                    browserFrame.onerror = function() {
                        reject(new Error('Ошибка загрузки страницы'));
                    };

                    // Таймаут
                    setTimeout(() => {
                        if (browserFrame.src === url) {
                            updateStatus('Загрузка завершена (таймаут)', 'success');
                            resolve();
                        }
                    }, 5000);
                });
            }

            // Метод 2: Имитация Google WebView
            function loadGoogleWebView(url) {
                return new Promise((resolve, reject) => {
                    // Создаем iframe с пользовательским User-Agent
                    const iframe = browserFrame;
                    iframe.src = url;
                    iframe.style.display = 'block';
                    
                    // Пытаемся обмануть сайт, изменив referrer policy
                    iframe.setAttribute('referrerpolicy', 'no-referrer');
                    
                    updateStatus('Используем метод Google WebView...');
                    resolve();
                });
            }

            // Метод 3: Textise-подобный метод (только текст)
            async function loadTextise(url) {
                try {
                    updateStatus('Получаем текстовое содержимое...');
                    
                    // Используем CORS прокси для получения текста
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    const response = await fetch(proxyUrl);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const html = await response.text();
                    
                    // Простой парсинг для извлечения текста
                    const text = extractTextFromHTML(html);
                    textContent.innerHTML = `<h3>Текстовое содержимое ${url}</h3><div style="white-space: pre-wrap;">${escapeHtml(text)}</div>`;
                    textContent.style.display = 'block';
                    
                    updateStatus('Текстовое содержимое загружено', 'success');
                } catch (error) {
                    throw new Error(`Не удалось получить текстовое содержимое: ${error.message}`);
                }
            }

            function extractTextFromHTML(html) {
                // Удаляем теги script и style
                let text = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
                text = text.replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '');
                
                // Заменяем теги на пробелы
                text = text.replace(/<[^>]+>/g, ' ');
                
                // Убираем лишние пробелы
                text = text.replace(/\s+/g, ' ').trim();
                
                return text.substring(0, 10000); // Ограничиваем длину
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function showStartPage() {
                browserFrame.style.display = 'none';
                textContent.style.display = 'none';
                startPage.style.display = 'flex';
            }

            // Обработчики событий
            goBtn.addEventListener('click', () => loadPage(urlInput.value));
            
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loadPage(urlInput.value);
            });

            backBtn.addEventListener('click', () => {
                try {
                    browserFrame.contentWindow.history.back();
                } catch (e) {
                    updateStatus('Навигация назад недоступна', 'error');
                }
            });

            forwardBtn.addEventListener('click', () => {
                try {
                    browserFrame.contentWindow.history.forward();
                } catch (e) {
                    updateStatus('Навигация вперед недоступна', 'error');
                }
            });

            refreshBtn.addEventListener('click', () => {
                if (browserFrame.style.display !== 'none') {
                    browserFrame.contentWindow.location.reload();
                } else if (currentUrl) {
                    loadPage(currentUrl);
                }
            });

            // Тестовые URL которые обычно работают
            setTimeout(() => {
                updateStatus('Попробуйте: duckduckgo.com, bing.com, httpbin.org/ip');
            }, 2000);
        });
    </script>
</body>
</html>
